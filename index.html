<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <div class="top-bar">
    <div class="title">Career Quiz</div>
    <div class="stats-row">
      <div class="stat-chip">Score <span class="val" id="scoreVal">0</span></div>
      <div class="stat-chip">Card <span class="val" id="cardVal">1/12</span></div>
      <div class="stat-chip">Streak <span class="val" id="streakVal">0</span></div>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progFill" style="width:0%"></div>
  </div>

  <div id="gameMain">
    <div class="quiz-card" id="quizCard">

      <!-- Image zone: placeholder before answer, portrait + info after -->
      <div class="img-section" id="imgSection">

        <!-- Placeholder -->
        <div class="img-placeholder">
          <div class="ph-inner">
            <div class="ph-icons">
              <div class="ph-icon" style="--d:0s;--x:-110px;--y:-10px;--s:1.3">🩺</div>
              <div class="ph-icon" style="--d:0.25s;--x:-80px;--y:-52px;--s:1.1">🎨</div>
              <div class="ph-icon" style="--d:0.5s;--x:-20px;--y:-68px;--s:1.2">⚽</div>
              <div class="ph-icon" style="--d:0.75s;--x:40px;--y:-62px;--s:1.1">🌱</div>
              <div class="ph-icon" style="--d:1s;--x:88px;--y:-42px;--s:1.3">🏗️</div>
              <div class="ph-icon" style="--d:0.1s;--x:112px;--y:6px;--s:1.1">💻</div>
              <div class="ph-icon" style="--d:0.35s;--x:90px;--y:46px;--s:1.2">📰</div>
              <div class="ph-icon" style="--d:0.6s;--x:40px;--y:66px;--s:1.1">💰</div>
              <div class="ph-icon" style="--d:0.85s;--x:-20px;--y:68px;--s:1.3">📚</div>
              <div class="ph-icon" style="--d:0.45s;--x:-80px;--y:48px;--s:1.1">🔬</div>
              <div class="ph-icon" style="--d:0.2s;--x:-112px;--y:10px;--s:1.2">🍳</div>
              <div class="ph-icon" style="--d:0.7s;--x:0px;--y:-90px;--s:1.0">🚒</div>
            </div>
            <div class="ph-q">?</div>
          </div>
          <p class="ph-hint">Guess the career to reveal the portrait</p>
        </div>

        <!-- Revealed state: blurred bg + image left + info right -->
        <div class="img-bg" id="imgBg"></div>
        <div class="img-reveal">
          <div class="img-fg">
            <img id="careerImg" src="" alt="career">
          </div>
          <div class="img-info" id="imgInfo">
            <div class="img-info-name" id="imgInfoName"></div>
            <div class="img-info-desc" id="imgInfoDesc"></div>
            <div class="img-info-row">
              <span class="info-label">🎓 Studies</span>
              <span class="info-val" id="imgInfoStudies"></span>
            </div>
            <div class="img-info-row">
              <span class="info-label">⚡ Skills</span>
              <span class="info-val" id="imgInfoSkills"></span>
            </div>
            <div class="img-info-did">
              <span class="did-label">💡 Did you know?</span>
              <span id="imgInfoDid"></span>
            </div>
          </div>
        </div>

      </div>

      <!-- Card body: clues (hidden when answered, replaced by answer-slot feedback) -->
      <div class="card-body" id="cardBody">
        <div class="card-header">
          <div class="who-am-i">Who am I?</div>
          <div class="card-counter" id="cardCounter">1 / 12</div>
        </div>
        <div class="clues-label">My clues</div>
        <div id="cluesList"></div>
      </div>

      <!-- Answer slot: show-btn and answer-box occupy the same space -->
      <div class="answer-slot">
        <div class="show-btn-wrap" id="showBtnWrap">
          <button class="show-btn" onclick="revealAnswer()">I give up — show me the answer</button>
        </div>
        <div class="answer-box" id="answerBox">
          <span class="answer-name" id="ansName"></span><span class="answer-sep"> — </span><span class="answer-desc" id="ansDesc"></span>
        </div>
      </div>

      <div class="options-wrap">
        <div class="options-grid" id="optGrid"></div>
      </div>

    </div>

    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="go(-1)">&#8592; Back</button>
      <div class="dots" id="dots"></div>
      <button class="nav-btn primary" id="nextBtn" onclick="go(1)">Next &#8594;</button>
    </div>
  </div>

  <div class="finish" id="finishScreen">
    <div class="finish-icon" id="finishIcon">🎉</div>
    <h2 id="finishTitle">Career expert!</h2>
    <p id="finishMsg"></p>
    <div class="finish-stats">
      <div class="fstat"><div class="fv" id="fScore">0</div><div class="fk">Score</div></div>
      <div class="fstat"><div class="fv" id="fPct">0%</div><div class="fk">Accuracy</div></div>
    </div>
    <button class="play-again" onclick="restart()">Play again</button>
  </div>

</div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
